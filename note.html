<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Notebook App</title>
  <link rel="stylesheet" href="note.css">
</head>

<body>
  <main class="notebook-container">
    <h1 class="notebook-title">My Notebook</h1>
    <div class="notes-container">
      <aside class="sidebar">

        <header class="sidebar__header">
          <h2 class="sidebar__title">Note List</h2>
          <button class="footer-button add-note-button">Create note</button>
        </header>

        <section class="note-list">

        </section>
      </aside>
      <section class="active-note">
        <article class="note-card">
          <h3 class="active-note-title" placeholder="Click create note and enter your title here..."></h3>

          <div class="notice-banner">
            <div class="notice-banner-message">
               <span>⚠️</span>
               <span class="notice-text-content"></span>
            </div>
          </div>
          <div class="note-editor" role="textbox" aria-multiline="true">


          </div>
          <footer class="note-card__footer">
            <button class="footer-button edit-button">Edit</button>
            <button class="footer-button menu">Menu</button>
            <button class="footer-button disable-editor-button">Lock</button>
          </footer>
        </article>
      </section>
    </div>
  </main>
  <script src="note.js"></script>
</body>

</html>
