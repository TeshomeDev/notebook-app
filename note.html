<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Notebook App</title>
  <link rel="stylesheet" href="note.css">
  <link href="https://fonts.googleapis.com/css?family=Poppins:100,100italic,200,200italic,300,300italic,regular,italic,500,500italic,600,600italic,700,700italic,800,800italic,900,900italic" rel="stylesheet" />
</head>

<body>
  <main class="notebook-container">
    <header class="notebook-header">
      <h1 class="notebook-title">My Notebook</h1>
      <button class="hamburger-menu">
        <div class="hamburger-menu__bar top"></div>
        <div class="hamburger-menu__bar middle"></div>
        <div class="hamburger-menu__bar bottom"></div>
      </button>
    </header>

    <div class="notes-container">
      <aside class="sidebar">

        <header class="sidebar__header">
          <h2 class="sidebar__title">Note List</h2>
          <button class="footer-button add-note-button">Add note</button>
        </header>

        <section class="note-list">

        </section>
      </aside>
      <section class="active-note">
        <article class="note-card">
          <h3 class="active-note-title" placeholder="Click create note and enter your title here..."></h3>

          <div class="notice-banner">
            <div class="notice-banner-message">
               <span>⚠️</span>
               <span class="notice-text-content"></span>
            </div>
          </div>
          <div class="note-editor" role="textbox" aria-multiline="true" placeholder="Write your note here...">


          </div>
          <footer class="note-card__footer">
            <button class="footer-button edit-button">Edit</button>

            <button class="footer-button disable-editor-button">Lock</button>
          </footer>
        </article>
      </section>
    </div>
  </main>
  <script src="note.js"></script>
</body>

</html>
